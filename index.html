<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-overflow-scrolling:touch;text-size-adjust:100%}

/* ===================== LIGHT MODE ===================== */
:root{
  --sage:#A8C695;--sage-light:#D1DCC9;--sage-dark:#7BA85F;
  --cream:#FFF8F0;--warm:#F9F7F4;--text:#2D3E2F;--text-muted:#6B7A6F;
  --sky:#B4D7E8;--sky-dark:#8FC5DB;--mint:#D4E8E4;--mint-accent:#5FB3A0;
  --border:#E5DDD5;--border-light:#F0E8E0;
  --accent:#7BA85F;--accent-light:#A8C695;
  --r:12px;--r2:20px;--r3:32px;
  --shadow:0 8px 32px rgba(45,62,47,0.08);--shadow-lg:0 16px 48px rgba(45,62,47,0.12);
  --transition:0.35s cubic-bezier(0.34,1.56,0.64,1);
  /* dark mode toggle button */
  --dm-btn-bg:rgba(168,198,149,0.15);--dm-btn-border:var(--sage);--dm-btn-color:var(--sage-dark);
}

/* ===================== DARK MODE — Night Forest & Earth ===================== */
html.dark {
  /* Base — rich night-soil earth with a cool moonlit green cast */
  --warm: #111a12;           /* forest floor at night — dark, earthy green-black */
  --cream: #172119;          /* slightly raised ground — mossy dark green */

  /* Text — moonlit ivory, warm not blue */
  --text: #e8ead5;           /* pale moonlit grass blade */
  --text-muted: #8a9e82;     /* dry moss, faded fern */

  /* Sage → vivid dewy grass green */
  --sage: #6dbb78;           /* fresh night grass, lit by moon */
  --sage-light: #3d6644;     /* deep forest mid-layer */
  --sage-dark: #9dd4a0;      /* bright dew-kissed grass tip */

  /* Sky → earthy warm amber-brown (firefly / moonrise glow) */
  --sky: #5c4a2a;            /* dark tree bark */
  --sky-dark: #c9a96e;       /* warm amber — moonlight through leaves */

  /* Mint → deep undergrowth */
  --mint: #1d3320;
  --mint-accent: #7cc97e;    /* bioluminescent moss */

  /* Borders — subtle root lines in the soil */
  --border: #243328;
  --border-light: #1d2a1f;

  --accent: #6dbb78;
  --accent-light: #3d6644;

  /* Shadows — deep forest shadow */
  --shadow: 0 8px 28px rgba(5, 12, 6, 0.6);
  --shadow-lg: 0 20px 56px rgba(5, 12, 6, 0.75);

  --dm-btn-bg: rgba(109, 187, 120, 0.12);
  --dm-btn-border: #6dbb78;
  --dm-btn-color: #9dd4a0;
}

/* ── Night forest background — layered depth, NO backdrop-filter on background ── */
html.dark body {
  background: #111a12;
}

/* Deep forest atmosphere — fixed layers, GPU composited, no paint on scroll */
html.dark body::before {
  content: '';
  position: fixed;
  inset: 0;
  z-index: -2;
  pointer-events: none;
  /* Moonlight filtering through canopy, warm soil glow at base */
  background:
    radial-gradient(ellipse 90% 50% at 50% -5%,  rgba(109,187,120,0.07) 0%, transparent 65%),
    radial-gradient(ellipse 60% 40% at 15% 40%,  rgba(58,90,46,0.18)   0%, transparent 55%),
    radial-gradient(ellipse 50% 35% at 90% 70%,  rgba(44,62,28,0.15)   0%, transparent 55%),
    radial-gradient(ellipse 80% 30% at 50% 100%, rgba(28,20,10,0.45)   0%, transparent 60%),
    linear-gradient(180deg, #111a12 0%, #0d1510 55%, #0a1009 100%);
  will-change: transform;
  transform: translateZ(0);
}

/* Grass texture — fine diagonal grain across the page, very subtle */
html.dark body::after {
  content: '';
  position: fixed;
  inset: 0;
  z-index: -1;
  pointer-events: none;
  opacity: 1;
  background-image:
    repeating-linear-gradient(
      80deg,
      transparent 0px,
      transparent 3px,
      rgba(60, 100, 50, 0.025) 3px,
      rgba(60, 100, 50, 0.025) 4px
    ),
    repeating-linear-gradient(
      170deg,
      transparent 0px,
      transparent 8px,
      rgba(30, 50, 20, 0.018) 8px,
      rgba(30, 50, 20, 0.018) 9px
    );
  will-change: transform;
  transform: translateZ(0);
}

/* ── Scrollbar — mossy earth ── */
html.dark ::-webkit-scrollbar-track { background: #0d1510; }
html.dark ::-webkit-scrollbar-thumb { background: #3a5e3c; border-radius: 10px; }

/* ── Cards — dark soil panels with mossy edge highlight ── */
html.dark .card,
html.dark .card-sm,
html.dark .pricing-card,
html.dark .feature-card,
html.dark .step-card,
html.dark .question-card,
html.dark .post-card,
html.dark .subject-dash-card,
html.dark .profile-header,
html.dark .gen-filter,
html.dark .chapter-item {
  background: #172119;
  border: 1px solid #243328;
  border-top: 1px solid rgba(109, 187, 120, 0.06);
  box-shadow: var(--shadow);
  /* NO backdrop-filter — kills scroll performance */
}

html.dark .subject-card {
  background: #172119;
  border-color: #243328;
}

/* ── Nav & Sidebar — solid, no backdrop-filter ── */
html.dark .pub-nav {
  background: rgba(13, 21, 14, 0.97);
  /* backdrop-filter intentionally removed for scroll perf */
  border-bottom: 1px solid #243328;
  box-shadow: 0 2px 20px rgba(5,12,6,0.5);
}
html.dark .sidebar {
  background: #0f1810;
  /* backdrop-filter intentionally removed for scroll perf */
  border-right: 1px solid #243328;
}

html.dark .page-header { background: rgba(17,26,18,0.6); border-color: #243328; }
html.dark footer { background: #0a1009; border-color: #243328; }
html.dark .modal { background: #172119; border: 1px solid #243328; }
html.dark .modal-overlay { background: rgba(5, 12, 6, 0.78); }
html.dark #toast { background: #172119; border-color: #243328; }

/* ── Inputs ── */
html.dark .input,
html.dark .select,
html.dark .search-input {
  background: #1d2a1f;
  color: var(--text);
  border-color: #243328;
  /* remove backdrop-filter */
  backdrop-filter: none;
  -webkit-backdrop-filter: none;
}
html.dark .input:focus,
html.dark .select:focus,
html.dark .search-input:focus { border-color: var(--sage); background: #223325; }
html.dark .input::placeholder,
html.dark .search-input::placeholder { color: var(--text-muted); }

/* ── Buttons ── */
html.dark .btn-primary { background: var(--sage); color: #111a12; }
html.dark .btn-primary:hover { background: var(--sage-dark); }

/* ── Chips, badges ── */
html.dark .topic-chip { background: #1d2a1f; border-color: #3a5e3c; color: var(--text); }
html.dark .topic-chip:hover,
html.dark .topic-chip.selected { background: var(--sage); color: #111a12; border-color: var(--sage); }

html.dark .badge { background: rgba(109,187,120,0.10); color: var(--sage-dark); }
html.dark .badge-mint { background: rgba(124,201,126,0.10); color: var(--mint-accent); }
html.dark .badge-muted { background: #1d2a1f; color: var(--text-muted); }

/* ── Sidebar links ── */
html.dark .sidebar-link.active { background: rgba(109,187,120,0.10); color: var(--sage-dark); border-left: 3px solid var(--sage); }
html.dark .sidebar-link:hover { background: rgba(109,187,120,0.06); color: var(--text); }

/* ── Stat cards, resource items ── */
html.dark .stat-card { background: rgba(23,33,25,0.8); border-color: #243328; }
html.dark .resource-item { background: #172119; border-color: #243328; }

/* ── Section alt (striped rows) ── */
html.dark .section.alt,
html.dark section[style*="rgba(168,198,149,0.05)"] { background: rgba(20,30,18,0.5) !important; }

/* ── Progress ── */
html.dark .progress-bar { background: #1d2a1f; }

/* ── Dividers, tabs ── */
html.dark .tabs { border-color: #243328; }
html.dark .divider { background: linear-gradient(90deg, transparent, #243328, transparent); }

/* ── Hover glows — like fireflies in undergrowth ── */
html.dark .card:hover,
html.dark .subject-card:hover,
html.dark .feature-card:hover,
html.dark .post-card:hover,
html.dark .subject-dash-card:hover {
  border-color: var(--sage);
  box-shadow: 0 16px 48px rgba(5,12,6,0.7), 0 0 22px rgba(109,187,120,0.09);
}

/* ── Streak badge ── */
html.dark .streak-badge {
  background: rgba(201,169,110,0.12);
  border-color: var(--sky-dark);
  color: var(--sky-dark);
}

/* ── Hero atmosphere ── */
html.dark .hero::before {
  background: radial-gradient(circle, rgba(109,187,120,0.10) 0%, transparent 70%);
}
html.dark .hero::after {
  background: radial-gradient(circle, rgba(44,62,28,0.25) 0%, transparent 70%);
}

/* Forest night animations */
html.dark .glow { animation: fireflyPulse 3s ease-in-out infinite; }
html.dark .streak-badge { animation: amberGlow 3s ease-in-out infinite; }

/* ── dm-toggle glow ── */
html.dark #dm-toggle { box-shadow: 0 0 10px rgba(109,187,120,0.20); }
/* ===================== SCROLL PERFORMANCE ===================== */
/* Promote scroll containers to their own compositor layer */
body{
  font-family:'Inter',sans-serif;background:var(--warm);color:var(--text);min-height:100vh;overflow-x:hidden;line-height:1.6;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  /* Avoid repaints during scroll by isolating stacking contexts */
  isolation:isolate;
}

/* Contain paint for sidebar & nav so scroll doesn't repaint them */
.pub-nav,.sidebar{
  will-change:transform;
  contain:layout style paint;
  transform:translateZ(0);
}

/* In dark mode: strip ALL backdrop-filters (they cause scroll lag) */
html.dark .pub-nav,
html.dark .sidebar,
html.dark .modal,
html.dark .hero-mockup,
html.dark .input,
html.dark .select,
html.dark .search-input {
  -webkit-backdrop-filter: none !important;
  backdrop-filter: none !important;
}

/* Only animate transform/opacity (compositor-only props) */
.card,.feature-card,.subject-card,.subject-dash-card,.step-card,.post-card,.pricing-card{
  will-change:transform;
  transform:translateZ(0);
}

/* Remove costly backdrop-filter on non-critical elements when scrolling */
@media(prefers-reduced-motion:reduce){
  .fade-in,.slide-left,.slide-right,.float,.glow,.scale-in{animation:none!important}
}

/* Limit expensive backdrop-filters to only key surfaces */
.pub-nav,.sidebar,.modal,.hero-mockup{
  -webkit-backdrop-filter:blur(12px);
  backdrop-filter:blur(12px);
  will-change:transform;
}

/* Smooth colour transition when toggling dark mode */
body,
.card,.card-sm,.subject-card,.feature-card,.step-card,.pricing-card,
.pub-nav,.sidebar,.page-header,footer,#toast,
.stat-card,.resource-item,.gen-filter,.question-card,.post-card,
.modal,.input,.select,.search-input{
  transition:background-color 0.4s ease,border-color 0.4s ease,color 0.3s ease;
}

/* Dark mode toggle button */
#dm-toggle{
  display:inline-flex;align-items:center;gap:6px;
  padding:8px 14px;border-radius:999px;
  background:var(--dm-btn-bg);
  border:1.5px solid var(--dm-btn-border);
  color:var(--dm-btn-color);
  font-size:13px;font-weight:700;
  cursor:pointer;transition:all 0.3s;
  font-family:'Inter',sans-serif;
  flex-shrink:0;
}
#dm-toggle:hover{transform:scale(1.06)}
html.dark #dm-toggle{box-shadow:0 0 12px rgba(109,187,120,0.22)}
h1,h2,h3,h4,h5{font-family:'Playfair Display',serif;line-height:1.2}
a{color:var(--accent);text-decoration:none}
button{cursor:pointer;font-family:'Inter',sans-serif;border:none;background:none}
input,select,textarea{font-family:'Inter',sans-serif}
img{max-width:100%}

/* SCROLLBAR */
::-webkit-scrollbar{width:8px}
::-webkit-scrollbar-track{background:var(--warm);transition:background 0.4s}
::-webkit-scrollbar-thumb{background:var(--sage);border-radius:4px}
* { scrollbar-width: thin; scrollbar-color: var(--sage) var(--warm); }

/* ANIMATIONS */
@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideInLeft{from{opacity:0;transform:translateX(-40px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideInRight{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
@keyframes floatSlow{0%,100%{transform:translateY(0px)}50%{transform:translateY(-12px)}}
@keyframes glowPulse{0%,100%{box-shadow:0 0 20px rgba(123,168,95,0.15)}50%{box-shadow:0 0 40px rgba(123,168,95,0.3)}}
@keyframes scaleIn{from{opacity:0;transform:scale(0.95)}to{opacity:1;transform:scale(1)}}
@keyframes shimmer{0%{background-position:0% 50%}100%{background-position:100% 50%}}
/* Forest night — firefly flicker on cards */
@keyframes fireflyPulse{0%,100%{box-shadow:0 0 0 rgba(109,187,120,0)}50%{box-shadow:0 0 16px rgba(109,187,120,0.14)}}
/* Amber moonrise glow for streak badge */
@keyframes amberGlow{0%,100%{box-shadow:0 0 8px rgba(201,169,110,0.1)}50%{box-shadow:0 0 18px rgba(201,169,110,0.22)}}

.fade-in{animation:fadeIn 0.6s ease-out}.fade-in-delay{animation:fadeIn 0.6s ease-out;animation-fill-mode:both}
.slide-left{animation:slideInLeft 0.6s ease-out}.slide-right{animation:slideInRight 0.6s ease-out}
.float{animation:floatSlow 3s ease-in-out infinite}.glow{animation:glowPulse 3s ease-in-out infinite}
.scale-in{animation:scaleIn 0.5s ease-out}

/* UTILITIES */
.hidden{display:none!important}.flex{display:flex}.flex-col{flex-direction:column}.items-center{align-items:center}
.justify-between{justify-content:space-between}.justify-center{justify-content:center}
.gap-1{gap:8px}.gap-2{gap:12px}.gap-3{gap:16px}.gap-4{gap:24px}.gap-6{gap:32px}
.grid{display:grid}.grid-2{grid-template-columns:repeat(2,1fr)}.grid-3{grid-template-columns:repeat(3,1fr)}.grid-auto{grid-template-columns:repeat(auto-fit,minmax(260px,1fr))}
.text-muted{color:var(--text-muted)}.text-sage{color:var(--sage)}.text-mint{color:var(--mint-accent)}.text-sky{color:var(--sky-dark)}
.text-sm{font-size:14px}.text-xs{font-size:12px}.text-lg{font-size:18px}.text-xl{font-size:22px}.text-2xl{font-size:28px}.text-3xl{font-size:36px}.text-4xl{font-size:48px}
.font-bold{font-weight:700}.font-semi{font-weight:600}.font-med{font-weight:500}
.mt-1{margin-top:8px}.mt-2{margin-top:12px}.mt-3{margin-top:16px}.mt-4{margin-top:24px}.mt-6{margin-top:32px}
.mb-1{margin-bottom:8px}.mb-2{margin-bottom:12px}.mb-3{margin-bottom:16px}.mb-4{margin-bottom:24px}.mb-6{margin-bottom:32px}
.p-2{padding:12px}.p-3{padding:16px}.p-4{padding:24px}.p-6{padding:32px}
.rounded{border-radius:var(--r)}.rounded-lg{border-radius:var(--r2)}.rounded-xl{border-radius:var(--r3)}.rounded-full{border-radius:9999px}
.truncate{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.relative{position:relative}.absolute{position:absolute}.w-full{width:100%}

/* CARDS */
.card{background:rgba(255,248,240,0.92);border:1px solid var(--border);border-radius:var(--r2);padding:24px;transition:transform 0.3s ease,box-shadow 0.3s ease,border-color 0.3s ease,background-color 0.4s ease;box-shadow:var(--shadow);cursor:pointer;will-change:transform;transform:translateZ(0)}
.card:hover{border-color:var(--sage);box-shadow:var(--shadow-lg);transform:translateY(-4px)}
.card-sm{background:rgba(255,248,240,0.92);border:1px solid var(--border);border-radius:var(--r);padding:16px;transition:background-color 0.4s ease,border-color 0.3s ease}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:8px;padding:12px 24px;border-radius:var(--r);font-size:14px;font-weight:600;transition:all 0.3s ease;cursor:pointer;border:none;font-family:'Inter',sans-serif}
.btn-primary{background:var(--sage);color:#fff}
.btn-primary:hover{background:var(--sage-dark);transform:translateY(-2px);box-shadow:0 12px 24px rgba(123,168,95,0.3)}
.btn-secondary{background:transparent;color:var(--text);border:1.5px solid var(--sage)}
.btn-secondary:hover{background:var(--sage);color:#fff}
.btn-ghost{background:transparent;color:var(--text-muted);border:none}
.btn-ghost:hover{color:var(--text)}
.btn-lg{padding:16px 32px;font-size:16px;border-radius:var(--r2)}
.btn-sm{padding:8px 16px;font-size:13px}
.btn-icon{padding:10px;width:40px;height:40px;justify-content:center}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:4px;padding:4px 12px;border-radius:999px;font-size:12px;font-weight:600;background:rgba(168,198,149,0.15);color:var(--sage-dark)}
.badge-mint{background:rgba(95,179,160,0.15);color:var(--mint-accent)}.badge-sky{background:rgba(180,215,232,0.2);color:var(--sky-dark)}
.badge-muted{background:var(--border-light);color:var(--text-muted)}

/* INPUTS */
.input{background:rgba(255,255,255,0.6);backdrop-filter:blur(4px);border:1.5px solid var(--border);color:var(--text);padding:12px 16px;border-radius:var(--r);font-size:14px;transition:all 0.3s;width:100%}
.input:focus{outline:none;border-color:var(--sage);background:rgba(255,255,255,0.9)}
.input::placeholder{color:var(--text-muted);opacity:0.6}
.select{background:rgba(255,255,255,0.6);backdrop-filter:blur(4px);border:1.5px solid var(--border);color:var(--text);padding:12px 16px;border-radius:var(--r);font-size:14px;width:100%;cursor:pointer;transition:all 0.3s}
.select:focus{outline:none;border-color:var(--sage)}
.label{display:block;font-size:13px;font-weight:600;color:var(--text);margin-bottom:8px}
.checkbox{width:18px;height:18px;cursor:pointer;accent-color:var(--sage)}

/* PROGRESS */
.progress-bar{background:var(--border);border-radius:999px;height:6px;overflow:hidden}
.progress-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--sage),var(--mint-accent));transition:width 0.8s cubic-bezier(0.34,1.56,0.64,1)}

/* TABS */
.tabs{display:flex;gap:2px;background:transparent;padding:0;border-bottom:2px solid var(--border)}
.tab{padding:12px 20px;border-radius:0;font-size:14px;font-weight:600;color:var(--text-muted);cursor:pointer;transition:all 0.3s;border:none;background:none;font-family:'Inter',sans-serif;border-bottom:3px solid transparent}
.tab.active{color:var(--text);border-bottom-color:var(--sage)}
.tab:hover:not(.active){color:var(--text)}

/* DIVIDER */
.divider{height:1px;background:linear-gradient(90deg,transparent,var(--border),transparent);margin:20px 0}

/* NAV */
.pub-nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(249,247,244,0.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 40px;height:64px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 4px 12px rgba(45,62,47,0.08)}
.pub-nav .logo{font-family:'Playfair Display',serif;font-size:24px;font-weight:700;color:var(--text);cursor:pointer;letter-spacing:-1px}
.pub-nav .logo span{color:var(--sage)}
.nav-links{display:flex;gap:2px;align-items:center}
.nav-link{padding:10px 16px;border-radius:var(--r);color:var(--text-muted);font-size:14px;font-weight:500;cursor:pointer;transition:all 0.3s}
.nav-link:hover{color:var(--text);background:rgba(168,198,149,0.1)}
.nav-actions{display:flex;align-items:center;gap:12px}

/* SIDEBAR */
.app-layout{display:flex;min-height:100vh}
.sidebar{width:260px;background:rgba(249,247,244,0.9);backdrop-filter:blur(12px);border-right:1px solid var(--border);position:fixed;top:0;left:0;bottom:0;display:flex;flex-direction:column;z-index:50;box-shadow:4px 0 12px rgba(45,62,47,0.08)}
.sidebar-logo{padding:24px 20px;font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:var(--text);border-bottom:1px solid var(--border)}
.sidebar-logo span{color:var(--sage)}
.sidebar-nav{flex:1;padding:16px 12px;overflow-y:auto;display:flex;flex-direction:column;gap:4px}
.sidebar-link{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:var(--r);color:var(--text-muted);font-size:14px;font-weight:500;cursor:pointer;transition:all 0.3s}
.sidebar-link:hover{background:rgba(168,198,149,0.1);color:var(--text)}
.sidebar-link.active{background:rgba(168,198,149,0.2);color:var(--sage-dark)}
.sidebar-link .icon{width:20px;text-align:center;font-size:16px}
.sidebar-section{font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.12em;padding:12px 14px 6px;margin-top:8px}
.sidebar-footer{padding:16px 12px;border-top:1px solid var(--border)}

function toast(msg,duration=2500){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),duration)}
function closeModal(){document.getElementById('modal').classList.add('hidden');document.getElementById('modal').innerHTML=''  }
function showAuth(mode='login'){state.authMode=mode;const modal=document.getElementById('modal');modal.classList.remove('hidden');modal.innerHTML=renderAuthModal();modal.onclick=(e)=>{if(e.target===modal)closeModal()}}

async function doLogin(){
  const inputs=document.querySelectorAll('#modal input');
  const email=inputs[0].value, password=inputs[1].value;
  if(!email||!password){toast('Please fill in both fields');return}
  const {error}=await window.supabase.auth.signInWithPassword({email,password});
  if(error){toast('Login failed: '+error.message);return}
  const {data:{user}}=await window.supabase.auth.getUser();
  resetUserState(user?.user_metadata?.full_name||user?.email||'Student');await loadUserScores();
  state.loggedIn=true;closeModal();navigate('dashboard');toast('Welcome back! 👋')
}
async function doSignup(){
  const inputs=document.querySelectorAll('#modal input');
  const name=inputs[0].value, email=inputs[1].value, password=inputs[2].value;
  if(!name||!email||!password){toast('Please fill in all fields');return}
  const {error}=await window.supabase.auth.signUp({email,password,options:{data:{full_name:name}}});
  if(error){toast('Signup failed: '+error.message);return}
  resetUserState(name);await loadUserScores();
  state.loggedIn=true;closeModal();navigate('dashboard');toast('Account created! Welcome to Aidify 🎉')
}
async function logout(){
  await window.supabase.auth.signOut();
  state.loggedIn=false;navigate('landing');toast('Logged out successfully')
}

rog}% complete</span><span>${Math.floor(sub.papers*prog/100)} / ${sub.papers} papers</span></div><div class="flex gap-1"><button class="btn btn-sm btn-secondary" style="flex:1;font-size:12px" onclick="event.stopPropagation();navigate('subject',{activeSubject:'${s}',subjectTab:'generator'})">📝 Generate</button><button class="btn btn-sm btn-secondary" style="flex:1;font-size:12px" onclick="event.stopPropagation();navigate('subject',{activeSubject:'${s}',subjectTab:'tracker'})">📊 Tracker</button></div></div>`;}).join('')}</div><div class="grid grid-2 gap-4"><div class="card"><h3 style="font-size:16px;font-weight:800;margin-bottom:16px">Recent Activity</h3>${[].map(a=>`<div class="activity-item"><div class="activity-dot" style="background:rgba(168,198,149,0.15)">${a.icon}</div><div style="flex:1"><div class="font-med text-sm">${a.text}</div><div class="text-xs text-muted">${a.sub}</div></div><div class="text-xs text-muted">${a.time}</div></div>`).join('')}</div><div class="card"><h3 style="font-size:16px;font-weight:800;margin-bottom:4px">Needs Attention</h3><p class="text-xs text-muted mb-3">Based on your past paper scores</p>${[].map(t=>`<div style="margin-bottom:14px"><div class="flex justify-between mb-1"><span class="text-sm font-med">${t.topic}</span><span class="text-sm" style="color:var(--${t.color==='red'?'text-red':'text-gold'})">${t.score}%</span></div><div class="progress-bar"><div class="progress-fill" style="width:${t.score}%;background:${t.color==='red'?'#FF6B6B':'#F4D9A8'}"></div></div><div class="text-xs text-muted mt-1">${t.subject}</div></div>`).join('')}</div></div></div></div>`}

function renderSubject(){const sub=SUBJECTS[state.activeSubject];const tabContent={papers:renderPapersTab,generator:renderGeneratorTab,resources:renderResourcesTab,hardest:renderHardestTab,tracker:renderTrackerTab,syllabus:renderSyllabusTab,community:renderCommunityTab}[state.subjectTab]();const tabs=[{id:'papers',label:'📄 Past Papers'},{id:'generator',label:'🎯 Generator'},{id:'resources',label:'📚 Resources'},{id:'hardest',label:'🔥 20 Hardest'},{id:'tracker',label:'📊 Tracker'},{id:'syllabus',label:'✅ Syllabus'},{id:'community',label:'💬 Community'}];return`${renderSidebar()}<div class="main-content"><div class="page-header"><div class="flex items-center gap-2 text-sm text-muted mb-3"><span style="cursor:pointer" onclick="navigate('dashboard')">Dashboard</span><span>›</span><span style="color:var(--text)">${sub.name}</span></div><div class="flex items-center justify-between mb-4"><div class="flex items-center gap-3"><div style="font-size:36px">${sub.emoji}</div><div><h1 style="font-size:26px;font-weight:800">${sub.name}</h1><p class="text-sm text-muted">${sub.code} · ${sub.papers} past papers · ${sub.questions.toLocaleString()} questions</p></div></div><div class="flex gap-2"><div class="badge">⭐ 124 stars earned</div><div class="badge badge-muted">${state.user.progress[state.activeSubject]||0}% complete</div></div></div><div style="overflow-x:auto;padding-bottom:1px"><div class="tabs" style="width:max-content">${tabs.map(t=>`<button class="tab ${state.subjectTab===t.id?'active':''}" onclick="navigate('subject',{activeSubject:'${state.activeSubject}',subjectTab:'${t.id}'})">${t.label}</button>`).join('')}</div></div></div><div class="page-body fade-in">${tabContent}</div></div>`}

function renderPapersTab(){const years=[...new Set(PAST_PAPERS.map(p=>p.year))].sort((a,b)=>b-a);return`<div class="flex justify-between items-center mb-4"><h2 style="font-size:18px;font-weight:800">Past Papers</h2><div class="flex gap-2"><select class="select" style="width:auto"><option>All Years</option>${years.map(y=>`<option>${y}</option>`).join('')}</select><select class="select" style="width:auto"><option>All Seasons</option><option>May/June</option><option>Oct/Nov</option><option>Feb/Mar</option></select></div></div>${years.map(year=>{const papers=PAST_PAPERS.filter(p=>p.year===year);return`<div class="card mb-3"><div class="flex items-center gap-2 mb-3"><span class="badge">${year}</span></div>${papers.map(p=>{const completed=state.trackerPapers[p.code];return`<div class="paper-row"><div><div class="font-med text-sm">${p.code}</div><div class="text-xs text-muted">${p.name} · ${p.season}</div></div><div class="flex gap-2 items-center">${completed?`<span class="badge badge-mint">✓ ${completed}/80</span>`:''}<button class="btn btn-ghost btn-sm" onclick="toast('Opening PDF...')">📄 Open PDF</button><button class="btn btn-ghost btn-sm" onclick="toast('Downloading...')">⬇ Download</button><button class="btn btn-sm ${completed?'btn-secondary':'btn-primary'}" onclick="markPaper('${p.code}')"> ${completed?'Update Score':'Mark Done'} </button></div></div>`;}).join('')}</div>`;}).join('')}`}

async function markPaper(code){const score=prompt(`Enter your score for ${code} (out of 80):`);if(!score||isNaN(score))return;const s=parseInt(score);const {error}=await window.supabase.from('scores').upsert({paper_code:code,score:s,subject:state.activeSubject},{onConflict:'user_id,paper_code'});if(error){toast('Error saving: '+error.message);return}state.trackerPapers[code]=s;toast(`Score saved: ${score}/80 ✓`);render()}

function renderGeneratorTab(){const sub=SUBJECTS[state.activeSubject];if(state.genResults)return renderGeneratorResults();return`<div class="grid grid-2 gap-4"><div><h2 style="font-size:18px;font-weight:800;margin-bottom:4px">Topical Question Generator</h2><p class="text-sm text-muted mb-4">Build a custom practice paper from real past paper questions</p><div class="gen-filter mb-3"><label class="label">Select Topics</label><div style="display:flex;flex-wrap:wrap;gap:4px">${sub.topics.map(t=>`<div class="topic-chip ${state.genTopics.includes(t)?'selected':''}" onclick="toggleTopic('${t}')">${t}</div>`).join('')}</div><div class="flex gap-2 mt-2"><button class="btn btn-ghost btn-sm" onclick="selectAllTopics()">Select All</button><button class="btn btn-ghost btn-sm" onclick="clearTopics()">Clear</button></div></div><div class="gen-filter mb-3"><label class="label">Year Range</label><div style="display:flex;flex-wrap:wrap;gap:4px">${[2019,2020,2021,2022,2023].map(y=>`<div class="topic-chip ${state.genYears.includes(y)?'selected':''}" onclick="toggleYear(${y})">${y}</div>`).join('')}</div></div><div class="grid grid-2 gap-3 mb-3"><div><label class="label">Number of Questions</label><select class="select" onchange="state.genCount=parseInt(this.value)">${[10,15,20,25,30,40,50].map(n=>`<option ${n===state.genCount?'selected':''}>${n}</option>`).join('')}</select></div><div><label class="label">Question Order</label><select class="select" onchange="state.genOrder=this.value"><option value="randomized" ${state.genOrder==='randomized'?'selected':''}>Randomized</option><option value="chronological" ${state.genOrder==='chronological'?'selected':''}>Chronological</option></select></div></div><button class="btn btn-primary btn-lg w-full" onclick="generatePaper()">🎯 Generate Paper →</button></div><div class="card-sm" style="background:rgba(255,248,240,0.8)"><h3 style="font-weight:700;margin-bottom:12px;font-size:15px">Paper Preview</h3><div style="font-size:13px;color:var(--text-muted)"><div class="flex justify-between mb-2"><span>Subject</span><span style="color:var(--text)">${sub.name}</span></div><div class="flex justify-between mb-2"><span>Topics selected</span><span style="color:var(--text)">${state.genTopics.length} topics</span></div><div class="flex justify-between mb-2"><span>Years</span><span style="color:var(--text)">${state.genYears.length?state.genYears.join(', '):'All years'}</span></div><div class="flex justify-between mb-2"><span>Questions requested</span><span style="color:var(--text)">${state.genCount}</span></div><div class="flex justify-between"><span>Order</span><span style="color:var(--text)">${state.genOrder==='randomized'?'🔀 Randomized':'📅 Chronological'}</span></div></div><div class="divider"></div><p class="text-xs text-muted">💡 Tip: If fewer questions exist than requested, all available questions will be shown.</p><div class="mt-3 p-3" style="background:rgba(168,198,149,0.15);border-radius:var(--r);border:1px solid rgba(168,198,149,0.3)"><p class="text-xs" style="color:var(--sage-dark)">ℹ️ This generator uses ONLY real past paper questions from our database — no AI-generated content.</p></div></div></div>`}

function toggleTopic(t){if(state.genTopics.includes(t))state.genTopics=state.genTopics.filter(x=>x!==t);else state.genTopics.push(t);render()}
function toggleYear(y){if(state.genYears.includes(y))state.genYears=state.genYears.filter(x=>x!==y);else state.genYears.push(y);render()}
function selectAllTopics(){state.genTopics=[...SUBJECTS[state.activeSubject].topics];render()}
function clearTopics(){state.genTopics=[];render()}
function generatePaper(){if(state.genTopics.length===0){toast('Please select at least one topic');return}state.genResults=true;state.showAnswers={};render()}

function renderGeneratorResults(){const sub=SUBJECTS[state.activeSubject];const papers=['9709/42/O/N/22','9709/41/M/J/22','9709/42/M/J/21','9709/41/O/N/21','9709/42/O/N/20'];const questions=state.genTopics.slice(0,state.genCount).map((t,i)=>({topic:t,year:state.genYears[i%Math.max(state.genYears.length,1)]||[2019,2020,2021,2022,2023][i%5],paper:papers[i%papers.length],qnum:`Q${(i%8)+1}${['a','b','c',''][i%4]}`,marks:[4,6,8,10][i%4]}));const total=Math.min(questions.length,state.genCount);return`<div class="flex items-center justify-between mb-4"><div><h2 style="font-size:18px;font-weight:800">${sub.name} — Custom Paper</h2><p class="text-sm text-muted">${state.genTopics.join(', ')} · ${total} questions · ${state.genOrder==='randomized'?'🔀 Randomized':'📅 Chronological'}</p></div><div class="flex gap-2"><button class="btn btn-ghost btn-sm" onclick="state.genResults=false;render()">← New Paper</button><button class="btn btn-secondary btn-sm" onclick="toast('Saving to account...')">💾 Save Paper</button></div></div>${questions.slice(0,total).map((q,i)=>`<div class="question-card" id="qcard-${i}" style="animation-delay:${i*0.05}s"><div class="flex justify-between items-start mb-2"><div><span class="font-semi" style="font-size:15px">Question ${i+1}</span><span class="text-muted text-sm ml-2">— ${q.paper} ${q.qnum}</span></div><div class="flex gap-1"><span class="badge">${q.topic}</span><span class="badge badge-muted">${q.marks} marks</span></div></div><div class="q-img">📐 Question image — ${q.paper} ${q.qnum} (${q.year})</div><div class="flex gap-2 items-center"><button class="btn btn-sm btn-ghost" onclick="toggleAnswer(${i})" id="ans-btn-${i}">▼ Show Answer</button><button class="btn btn-sm btn-ghost" onclick="toast('Bookmarked!')">🔖 Bookmark</button><button class="btn btn-sm btn-ghost" onclick="toast('Reported')">⚠ Report</button></div><div id="ans-${i}" style="display:${state.showAnswers[i]?'block':'none'}"><div class="answer-box mt-2"><div class="text-sm font-semi text-mint mb-2">📋 Answer / Mark Scheme</div><div style="background:rgba(255,248,240,0.9);border-radius:var(--r);height:100px;display:flex;align-items:center;justify-content:center;color:var(--text-muted);font-size:13px;margin-bottom:10px">Answer image — ${q.paper} ${q.qnum}</div><a href="#" class="btn btn-sm btn-secondary" onclick="event.preventDefault();toast('Opening YouTube...')">▶ Watch Solution on YouTube</a></div></div></div>`).join('')}`}

function toggleAnswer(i){state.showAnswers[i]=!state.showAnswers[i];const box=document.getElementById(`ans-${i}`);const btn=document.getElementById(`ans-btn-${i}`);if(box)box.style.display=state.showAnswers[i]?'block':'none';if(btn)btn.textContent=state.showAnswers[i]?'▲ Hide Answer':'▼ Show Answer'}

function renderResourcesTab(){const sub=SUBJECTS[state.activeSubject];const topics=sub.topics.slice(0,6);return`<div class="flex justify-between items-center mb-4"><h2 style="font-size:18px;font-weight:800">Resources</h2><div class="search-wrap" style="width:240px"><span class="icon">🔍</span><input class="search-input" placeholder="Search resources..."></div></div>${topics.map(topic=>`<div class="card mb-3"><div class="flex items-center justify-between mb-3"><h3 style="font-weight:700;font-size:15px">${topic}</h3><span class="badge badge-muted">${(Math.floor(Math.random()*5)+2)} items</span></div>${RESOURCES.slice(0,3).map(r=>`<div class="resource-item" onclick="toast('Opening ${r.title}...')"><div class="res-icon" style="background:rgba(168,198,149,0.15)">${r.icon}</div><div style="flex:1"><div class="text-sm font-med">${r.title}</div><div class="text-xs text-muted">${r.type==='video'?'YouTube Video':r.type==='pdf'?'PDF Document':'Worksheet'}</div></div><span class="text-muted text-sm">→</span></div>`).join('')}</div>`).join('')}`}

function renderHardestTab(){return`<div class="flex justify-between items-center mb-4"><div><h2 style="font-size:18px;font-weight:800">20 Hardest Questions</h2><p class="text-sm text-muted">Curated by our team — the most challenging questions</p></div></div>${HARDEST.map((q,i)=>`<div class="card mb-3"><div class="flex items-start justify-between mb-3"><div class="flex items-center gap-3"><div style="width:32px;height:32px;background:rgba(255,107,107,0.15);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;color:#FF6B6B">${i+1}</div><div><div class="font-semi text-sm">${q.desc}</div><div class="text-xs text-muted">${q.paper} · ${q.year} · ${q.topic}</div></div></div><span class="badge ${q.difficulty==='Very Hard'?'badge-mint':''}" style="background:${q.difficulty==='Very Hard'?'rgba(95,179,160,0.15)':'rgba(244,217,168,0.2)'};color:${q.difficulty==='Very Hard'?'var(--mint-accent)':'#C99A48'}">${q.difficulty}</span></div><div class="q-img" style="height:120px">📐 Question image — ${q.year} ${q.paper}</div><div class="flex gap-2"><button class="btn btn-sm btn-ghost" onclick="toast('Showing answer...')">▼ Show Answer</button><button class="btn btn-sm btn-secondary" onclick="toast('Opening YouTube...')">▶ Watch Explanation</button></div></div>`).join('')}`}

function renderTrackerTab(){const papers=Object.entries(state.trackerPapers);const avg=papers.length?Math.round(papers.reduce((s,[,v])=>s+v,0)/papers.length):0;const max=papers.length?Math.max(...papers.map(([,v])=>v)):0;const min=papers.length?Math.min(...papers.map(([,v])=>v)):0;return`<div class="grid" style="grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px">${[{num:papers.length,lbl:'Papers Completed'},{num:avg+'%',lbl:'Average Score'},{num:max+'%',lbl:'Highest Score'},{num:min+'%',lbl:'Lowest Score'}].map(s=>`<div class="stat-card"><span class="num" style="color:var(--sage)">${s.num}</span><div class="lbl">${s.lbl}</div></div>`).join('')}</div><div class="card mb-4"><h3 style="font-weight:800;font-size:16px;margin-bottom:20px">Marks Over Time</h3><div class="chart-bar-wrap" style="padding-bottom:28px;align-items:flex-end">${papers.slice(0,8).map(([code,score])=>`<div class="chart-bar" style="height:${score}%" title="${code}: ${score}%"><div class="bar-label">${code.split('/')[2]||code.slice(-4)}</div><div class="bar-val">${score}%</div></div>`).join('')}</div><div style="height:1px;background:var(--border);margin-top:8px"></div></div><div class="card"><div class="flex justify-between items-center mb-4"><h3 style="font-weight:800;font-size:16px">Paper Log</h3><button class="btn btn-primary btn-sm" onclick="toast('Add paper form coming soon!')">+ Add Paper</button></div>${papers.map(([code,score])=>`<div class="paper-row"><div><div class="font-med text-sm">${code}</div><div class="text-xs text-muted">Past Paper · Completed</div></div><div class="flex items-center gap-3"><div class="progress-bar" style="width:120px"><div class="progress-fill" style="width:${score}%"></div></div><span class="badge ${score>=70?'badge-mint':score>=50?'':'badge-muted'}" style="background:${score>=70?'rgba(95,179,160,0.15)':score>=50?'rgba(244,217,168,0.2)':'rgba(229,221,213,0.5)'};color:${score>=70?'var(--mint-accent)':score>=50?'#C99A48':'var(--text-muted)'}">${score}%</span><button class="btn btn-ghost btn-sm" onclick="toast('Edit score')">✏</button></div></div>`).join('')}</div>`}

function renderSyllabusTab(){const chapters=SYLLABUS_CHAPTERS.math||[];return`<div class="flex justify-between items-center mb-4"><div><h2 style="font-size:18px;font-weight:800">Syllabus Tracker</h2><p class="text-sm text-muted">Track your syllabus completion chapter by chapter</p></div><div class="badge"> ${Object.keys(state.syllabus).length} / ${chapters.reduce((s,c)=>s+c.topics.length,0)} topics done </div></div>${chapters.map((ch,ci)=>`<div style="margin-bottom:16px"><div class="flex items-center justify-between mb-2"><h3 style="font-weight:700;font-size:15px">${ch.name}</h3><span class="text-xs text-muted">${ch.topics.filter(t=>state.syllabus[ci+'-'+t]).length}/${ch.topics.length} topics</span></div><div class="progress-bar mb-2"><div class="progress-fill" style="width:${Math.round(ch.topics.filter(t=>state.syllabus[ci+'-'+t]).length/ch.topics.length*100)}%"></div></div>${ch.topics.map(t=>{const key=ci+'-'+t;const done=state.syllabus[key];return`<div class="subtopic ${done?'done':''}" onclick="toggleSyllabus('${key}');event.stopPropagation()"><input type="checkbox" class="checkbox" ${done?'checked':''} onclick="toggleSyllabus('${key}')"> ${t}</div>`;}).join('')}</div>`).join('')}`}

function toggleSyllabus(key){state.syllabus[key]=!state.syllabus[key];toast(state.syllabus[key]?'Topic marked complete ✓':'Topic unmarked');render()}

function renderCommunityTab(){return renderCommunityPage(true)}

function renderCommunityPage(embedded=false){const header=embedded?`<div class="flex justify-between items-center mb-4"><h2 style="font-size:18px;font-weight:800">Community Discussions</h2><button class="btn btn-primary btn-sm" onclick="toast('Post form coming soon!')">+ New Post</button></div>`:` ${renderSidebar()}<div class="main-content"><div class="page-header"><div class="flex justify-between items-center" style="padding-bottom:20px"><div><h1 style="font-size:26px;font-weight:800">Community</h1><p class="text-sm text-muted">Ask questions, share solutions, help others</p></div><button class="btn btn-primary" onclick="toast('Post form coming soon!')">+ New Post</button></div></div><div class="page-body">`;const content=`${header}<div class="flex gap-2 mb-4" style="flex-wrap:wrap"><button class="btn btn-primary btn-sm">All Posts</button>${['Mathematics','Physics','CS','Unanswered'].map(s=>`<button class="btn btn-ghost btn-sm">${s}</button>`).join('')}</div>${COMMUNITY_POSTS.map(post=>`<div class="post-card fade-in" onclick="toast('Opening post...')"><div class="flex gap-2 mb-2 items-start"><div class="avatar" style="width:32px;height:32px;font-size:12px;flex-shrink:0">${post.avatar}</div><div style="flex:1"><div class="user-mini mb-1">${post.user} · <span class="badge">${SUBJECTS[post.subject].name}</span> · ${post.time}</div><h3 style="font-size:15px;font-weight:700;margin-bottom:6px">${post.title}</h3><p class="text-sm text-muted mb-2">${post.body}</p><div class="flex gap-1 mb-3">${post.tags.map(t=>`<span class="badge badge-muted">${t}</span>`).join('')}</div><div class="flex gap-2"><button class="vote-btn" onclick="event.stopPropagation();likePost(${post.id})">👍 ${state.likes[post.id]||post.likes}</button><button class="vote-btn">💬 ${post.comments} comments</button><button class="vote-btn" onclick="event.stopPropagation();toast('Bookmarked!')">🔖 Save</button></div></div></div></div>`).join('')}`;return embedded?content:content+'</div></div>'}

function likePost(id){state.likes[id]=(state.likes[id]||COMMUNITY_POSTS.find(p=>p.id===id).likes)+1;toast('👍 Liked!');render()}

function renderProfile(){return`${renderSidebar()}<div class="main-content"><div class="page-header"><h1 style="font-size:26px;font-weight:800;padding-bottom:20px">My Profile</h1></div><div class="page-body"><div class="profile-header mb-4"><div class="avatar-lg">AK</div><div style="flex:1"><h2 style="font-size:22px;font-weight:800">${state.user.name}</h2><p class="text-muted">@${state.user.username}</p><div class="flex gap-2 mt-2"><span class="badge">⭐ ${state.user.stars} stars</span><span class="badge badge-mint">🔥 ${state.user.streak}-day streak</span><span class="badge">📄 ${state.user.papersCompleted} papers</span></div></div><button class="btn btn-secondary">✏ Edit Profile</button></div><div class="grid grid-2 gap-4"><div class="card"><h3 style="font-weight:800;margin-bottom:16px;font-size:16px">My Subscriptions</h3>${state.user.subjects.map(s=>{const sub=SUBJECTS[s];return`<div class="flex items-center justify-between mb-3 pb-3" style="border-bottom:1px solid var(--border)"><div class="flex items-center gap-3">${sub.emoji}<div><div class="font-semi text-sm">${sub.name}</div><div class="text-xs text-muted">${sub.code}</div></div></div><span class="badge badge-mint">Active</span></div>`;}).join('')}<button class="btn btn-ghost btn-sm w-full mt-2" onclick="navigate('pricing')">+ Upgrade to Bundle</button></div><div class="card"><h3 style="font-weight:800;margin-bottom:16px;font-size:16px">Subject Progress</h3>${state.user.subjects.map(s=>{const sub=SUBJECTS[s];const prog=state.user.progress[s]||0;return`<div class="mb-4"><div class="flex justify-between mb-1"><span class="font-med text-sm">${sub.emoji} ${sub.name}</span><span class="text-sm" style="color:var(--sage)">${prog}%</span></div><div class="progress-bar"><div class="progress-fill" style="width:${prog}%"></div></div></div>`;}).join('')}</div><div class="card"><h3 style="font-weight:800;margin-bottom:16px;font-size:16px">Stars & Achievements</h3><div class="grid grid-2 gap-3">${[{icon:'⭐',label:'Total Stars',val:state.user.stars},{icon:'📄',label:'Papers Done',val:state.user.papersCompleted},{icon:'🔥',label:'Best Streak',val:'12 days'},{icon:'🏆',label:'Rank',val:'#47'}].map(a=>`<div class="stat-card"><span class="num" style="font-size:22px">${a.icon}</span><span class="num" style="font-size:20px">${a.val}</span><div class="lbl">${a.label}</div></div>`).join('')}</div></div><div class="card"><h3 style="font-weight:800;margin-bottom:16px;font-size:16px">Saved Questions</h3><div class="empty-state"><div class="icon">🔖</div><p>No bookmarked questions yet</p><p class="text-xs mt-2">Bookmark questions from the generator to revisit them here</p></div></div></div></div></div>`}

function render(){const app=document.getElementById('app');if(!state.loggedIn){switch(state.page){case 'pricing':app.innerHTML=renderPricing();break;default:app.innerHTML=renderLanding()}}else{switch(state.page){case 'dashboard':app.innerHTML=renderDashboard();break;case 'subject':app.innerHTML=renderSubject();break;case 'community':app.innerHTML=renderCommunityPage(false);break;case 'profile':app.innerHTML=renderProfile();break;default:app.innerHTML=renderDashboard()}}}

async function initAuth()
  {while(!window.supabase){await new Promise(r=>setTimeout(r,50))}
  const {data:{session}}=await window.supabase.auth.getSession();
  if(session){resetUserState(session.user.user_metadata?.full_name||session.user.email);await loadUserScores();state.loggedIn=true;state.page='dashboard'}
  render();
  window.supabase.auth.onAuthStateChange((event,session)=>{
    if(event==='SIGNED_OUT'){state.loggedIn=false;render()}
  });
}
initAuth();
</script>
</body>
</html>
